name: Release (Open VSX)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify package.json version matches tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "package.json version ($VERSION) does not match tag $GITHUB_REF_NAME (expected $TAG)"
            exit 1
          fi

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "Tagged commit is not contained in origin/main; refuse to publish."
            exit 1
          }

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production build
        run: pnpm run vscode:prepublish

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm exec ovsx publish --no-dependencies -p "$OVSX_PAT"
