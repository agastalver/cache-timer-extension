name: Release (Open VSX + GitHub)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify package.json version matches tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "package.json version ($VERSION) does not match tag $GITHUB_REF_NAME (expected $TAG)"
            exit 1
          fi

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "Tagged commit is not contained in origin/main; refuse to publish."
            exit 1
          }

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package VSIX
        id: pack
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "vsix_path=cache-timer-extension-${VERSION}.vsix" >> "$GITHUB_OUTPUT"
          pnpm run vscode:prepublish
          cp package.json package.json.bak
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); delete p.scripts['vscode:prepublish']; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');"
          pnpm exec vsce package --no-dependencies --allow-missing-repository
          mv package.json.bak package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.vsix_path }}
          generate_release_notes: true

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm exec ovsx publish -p "$OVSX_PAT" "${{ steps.pack.outputs.vsix_path }}"
